	<!-- Initialize Swiper -->
	<script>
		//run_time-js
		var blog_run_time=setInterval(run_time,1000);
		var start_time=new Date(2021,1,2,0,0,0);
		var s=0,m=0,h=0,d=0,s1=0;
		function run_time(){
			var current_time=new Date();
			var run=(current_time.getTime()-start_time.getTime());
			if(run>24*60*60*1000){
				h=run%(24*60*60*1000);
				d=(run-h)/(24*60*60*1000);
			}
			if(h>60*60*1000){
				m=h%(60*60*1000);
				h=(h-m)/(60*60*1000);
			}
			else{
				s=h%(60*1000);
				m=(h-s)/(60*1000);
				h=0;
			}
			if(m>60*1000){
				s=m%(60*1000);
				m=(m-s)/(60*1000);
			}
			if(s>60){
				s1=s%1000;
				s=(s-s1)/1000;
			}
			document.getElementById("run_time").innerHTML="博客已运行"+d+"天"+h+"小时"+m+"分"+s+"秒";
		}
		//index_menu-js
		var flag=true;
		function index_menu_onmousemove(){
			
			if(flag==true){
				index_menu_onmouseover_one();
			}
			document.getElementById('index_sound_second').play();//音效
			//封装
			function index_menu_onmouseover_one(){
				var para=document.createElement("a");
				para.innerHTML="<img  src='https://cdn.jsdelivr.net/gh/hellterrace/CDN/images/ds.jpg'>";
				var element=document.getElementById("index_menu");
				element.appendChild(para);
			    flag=false;
			}
		}
		function index_menu_onmouseout(){
			var element=document.getElementById("index_menu");
			element.removeFilter(document.getElementById('index_menu_img'));
		}
	</script>
