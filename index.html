	<!-- Initialize Swiper -->
	<script>
		var blog_run_time=setInterval(run_time,1000);
		var start_time=new Date(2021,1,2,0,0,0);
		var s=0,m=0,h=0,d=0,s1=0;
		function run_time(){
			var current_time=new Date();
			var run=(current_time.getTime()-start_time.getTime());
			
			if(s>60){
				m++;
				s=s%60;
			}
			if(m>60){
				h++;
				h=h%60;
			}
			if(run>24*60*60*1000){
				h=run%(24*60*60*1000);
				d=(run-h)/(24*60*60*1000);
			}
			if(h>60*60*1000){
				m=h%(60*60*1000);
				h=(h-m)/(60*60*1000);
			}
			if(m>60*1000){
				s=m%(60*1000);
				m=(m-s)/(60*1000);
			}
			if(s>60){
				s1=s%1000;
				s=(s-s1)/1000;
			}
			document.getElementById("run_time").innerHTML="博客已运行"+d+"天"+h+"小时"+m+"分"+s+"秒";
		}
	</script>
